<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>我的个人网站</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.hero {
  padding: 60px;
}

.container {
  max-width: 600px;
  margin: auto;
}

input {
  padding: 10px;
  width: 70%;
}

button {
  padding: 10px;
  margin: 5px;
  background: #38bdf8;
  border: none;
  border-radius: 5px;
}

li {
  background: #1e293b;
  margin: 10px;
  padding: 10px;
  list-style: none;
}
</style>

</head>

<body>

<div class="hero">
  <h1>👋 我是 zby</h1>
  <p>一个做2b游戏和安慕希地图的玩家</p>
</div>

<div class="container">

<h2>💬 留言板</h2>

<input id="msg" placeholder="说点什么...">
<button onclick="sendMsg()">发送</button>

<br><br>
<input id="adminPass" placeholder="zby208200">

<ul id="list"></ul>

</div>

<script>
const API = "Worker地址";

async function loadMsg() {
  const res = await fetch(API + "/get");
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.reverse().forEach(m => {
    const li = document.createElement("li");
    li.innerHTML = `
      ${m.text}<br>
      👍 ${m.likes}
      <button onclick="likeMsg(${m.id}, ${m.likes})">点赞</button>
      <button onclick="deleteMsg(${m.id})">删除</button>
    `;
    list.appendChild(li);
  });
}

async function sendMsg() {
  const text = document.getElementById("msg").value;

  await fetch(API + "/post", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({text})
  });

  loadMsg();
}

async function likeMsg(id, likes) {
  await fetch(API + "/like", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({id, likes})
  });

  loadMsg();
}

async function deleteMsg(id) {
  const password = document.getElementById("adminPass").value;

  await fetch(API + "/delete", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({id, password})
  });

  loadMsg();
}

loadMsg();
</script>

</body>
</html>
